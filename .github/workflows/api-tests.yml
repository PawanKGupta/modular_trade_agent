name: Backend Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ "**" ]

jobs:
  backend-tests:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r server/requirements.txt
          pip install -r requirements-dev.txt
          # Install neo_api_client for Python 3.12+ (install without dependencies to avoid numpy==1.24.2 conflict)
          # The module itself works with Python 3.12, only the numpy dependency conflicts
          pip install --no-deps git+https://github.com/Kotak-Neo/kotak-neo-api@67143c58f29da9572cdbb273199852682a0019d5#egg=neo-api-client

      - name: Lint & Typecheck (server)
        run: |
          ruff check .
          black --check .
          mypy server app || true

      - name: Run backend unit and integration tests
        env:
          DB_URL: "sqlite:///:memory:"
        run: |
          pytest tests/unit tests/server tests/infrastructure tests/scripts tests/integration tests/regression tests/security tests/paper_trading -q -n=auto

  integration-concurrency-postgres:
    name: Integration Concurrency (Postgres)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        postgres-version: [14, 16]

    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: trading_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r server/requirements.txt
          pip install -r requirements-dev.txt
          pip install --no-deps git+https://github.com/Kotak-Neo/kotak-neo-api@67143c58f29da9572cdbb273199852682a0019d5#egg=neo-api-client

      - name: Wait for Postgres
        env:
          PGPASSWORD: postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres && break
            sleep 2
          done
          createdb -h localhost -p 5432 -U postgres trading_test || true

      - name: Run integration concurrency tests (Postgres)
        env:
          DB_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/trading_test
        run: |
          # Override pytest.ini addopts to avoid coverage gating in this smoke job
          pytest tests/integration/test_scheduler_thread_safety_integration.py -m integration -q -o addopts=""
