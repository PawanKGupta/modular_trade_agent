name: CodeQL

on:
  # NOTE: This workflow is an *advanced* CodeQL configuration.
  # GitHub cannot process SARIF uploads from advanced configurations when
  # the repository has CodeQL "default setup" enabled.
  #
  # Options:
  # - Keep default setup enabled: leave this workflow manual-only (current).
  # - Switch to advanced configuration: disable default setup in GitHub UI,
  #   then re-add push/pull_request/schedule triggers.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'python', 'javascript-typescript' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
