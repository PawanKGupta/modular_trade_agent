[tool.black]
line-length = 100
target-version = ["py312"]

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [
	".git",
	".venv",
	"dist",
	"build",
	"htmlcov",
	# Legacy ML modules exceed PL/complexity rules; refactor tracked separately.
	"services/analysis_service.py",
	"services/ml_verdict_service.py",
	"services/ml_training_service.py",
	"services/ml_retraining_service.py",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "S", "PL"]
ignore = ["S101"] # allow assert in tests

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S", "PLR2004", "PLC0415", "PLR0913", "PLW0108", "F841", "E501", "E402"]
